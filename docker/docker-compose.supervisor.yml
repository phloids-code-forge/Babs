services:
  supervisor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.supervisor
    container_name: babs-supervisor
    restart: always
    environment:
      - NATS_URL=nats://nats-babs:4222
      - VLLM_URL=http://172.17.0.1:8000/v1
      - MODEL_NAME=local/nemotron3-nano-nvfp4
      - QDRANT_URL=http://172.17.0.1:6333
      - EMBEDDING_URL=http://g14:8080
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-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}
      - MODELS_DIR=/home/dave/babs-data/models
      - CACHE_FILE=/home/dave/babs/config/model_registry.json
    volumes:
      - /home/dave/babs-data:/home/dave/babs-data
      - /home/dave/babs/config:/home/dave/babs/config
      - /home/dave/babs/src:/home/dave/babs/src
    networks:
      - babs-net
    depends_on:
      - nats

  nats:
    image: nats:latest
    container_name: nats-babs
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    volumes:
      - /home/dave/babs-data/nats:/data
    command:
      - "--jetstream"
      - "--store_dir=/data"
    networks:
      - babs-net

networks:
  babs-net:
    external: true
    name: docker_babs-net
