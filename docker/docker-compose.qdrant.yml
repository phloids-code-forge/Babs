services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-babs
    restart: always
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - /home/dave/babs-data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - babs-net

networks:
  babs-net:
    external: true
    name: docker_babs-net
